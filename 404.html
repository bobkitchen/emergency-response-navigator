<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Emergency Response Navigator</title>
  <script>
    // GitHub Pages SPA routing: store the full path in sessionStorage
    // then redirect to index.html, which will restore it via history.replaceState
    sessionStorage.setItem('redirect', location.pathname + location.search + location.hash);
    location.replace('/emergency-response-navigator/');
  </script>
</head>
<body>
</body>
</html>
