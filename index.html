<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/emergency-navigator/irc-logo-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="IRC Emergency Response Navigator — navigate the response process, find resources, get AI guidance" />
    <title>Emergency Response Navigator</title>
    <!-- Arial is a system font — no external font loading needed -->
    <!-- GitHub Pages SPA redirect -->
    <script>
      (function(){
        var sp = new URLSearchParams(window.location.search);
        var p = sp.get('/');
        if (p) {
          sessionStorage.setItem('redirect', p + window.location.hash);
          window.history.replaceState(null, '', '/' + p + window.location.hash);
        }
      })();
    </script>
  </head>
  <body class="bg-irc-gray-50 text-irc-gray-800 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
