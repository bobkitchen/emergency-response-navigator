            .staticrypt-html {
                height: 100%;
            }

            .staticrypt-body {
                height: 100%;
                margin: 0;

                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .staticrypt-content {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #0d0d0d;
            }

            .staticrypt-page {
                width: 380px;
                padding: 0 20px;
                box-sizing: border-box;
            }

            .staticrypt-logo {
                display: block;
                width: 200px;
                margin: 0 auto 32px;
            }

            .staticrypt-form {
                background: #1a1a1a;
                border-radius: 12px;
                padding: 40px 32px;
                text-align: center;
                border: 1px solid #2a2a2a;
            }

            .staticrypt-title {
                font-size: 1.25em;
                font-weight: 600;
                color: #ffffff;
                margin: 0 0 6px;
                letter-spacing: -0.02em;
            }

            .staticrypt-instructions {
                margin: 0 0 24px;
            }

            .staticrypt-instructions p:last-child {
                font-size: 0.875em;
                color: #999999;
                margin: 0;
            }

            .staticrypt-hr {
                border: 0;
                border-top: 1px solid #2a2a2a;
                margin: 0 0 24px;
            }

            .staticrypt-password-container {
                position: relative;
                background: #0d0d0d;
                border: 1px solid #383838;
                border-radius: 8px;
                margin: 0 0 16px;
                box-sizing: border-box;
                transition: border-color 0.15s;
            }

            .staticrypt-password-container:focus-within {
                border-color: #FFC72C;
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                box-sizing: border-box;
                font-family: "DM Sans", Arial, sans-serif;
                font-size: 14px;
                color: #ffffff;
                outline: 0;
                padding: 14px 40px 14px 16px;
                width: 100%;
            }

            .staticrypt-form input::placeholder {
                color: #666;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                width: 18px;
                opacity: 40%;
                padding: 12px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                filter: invert(1);
                transition: opacity 0.15s;
            }

            .staticrypt-toggle-password-visibility:hover {
                opacity: 70%;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                font-family: "DM Sans", Arial, sans-serif;
                text-transform: uppercase;
                font-weight: 700;
                font-size: 13px;
                letter-spacing: 0.05em;
                outline: 0;
                background: #FFC72C;
                width: 100%;
                border: 0;
                border-radius: 8px;
                padding: 14px;
                color: #000000;
                cursor: pointer;
                transition: filter 0.15s;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                filter: brightness(110%);
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 16px;
                color: #999;
                font-size: 0.875em;
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.3);
                margin-right: 8px;
                accent-color: #FFC72C;
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #0d0d0d;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 0.25em solid #333;
                border-right-color: #FFC72C;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% {
                    transform: rotate(360deg);
                }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] {
                    font-size: 16px;
                }
            }

        <script>
            // these variables will be filled when generating the file - the template format is '/*[|variable_name|]*/0'
            const staticryptInitiator = /*[|js_staticrypt|]*/ 0;
            const templateError = "/*[|template_error|]*/0",
                templateToggleAltShow = "/*[|template_toggle_show|]*/0",
                templateToggleAltHide = "/*[|template_toggle_hide|]*/0",
                isRememberEnabled = /*[|is_remember_enabled|]*/ 0,
                staticryptConfig = /*[|staticrypt_config|]*/ 0;

            // you can edit these values to customize some of the behavior of StatiCrypt
            const templateConfig = {
                rememberExpirationKey: "staticrypt_expiration",
                rememberPassphraseKey: "staticrypt_passphrase",
                replaceHtmlCallback: null,
                clearLocalStorageCallback: null,
            };

            // init the staticrypt engine
            const staticrypt = staticryptInitiator.init(staticryptConfig, templateConfig);

            // try to automatically decrypt on load if there is a saved password
            window.onload = async function () {
                const { isSuccessful } = await staticrypt.handleDecryptOnLoad();

                // if we didn't decrypt anything on load, show the password prompt. Otherwise the content has already been
                // replaced, no need to do anything
                if (!isSuccessful) {
                    // hide loading screen
                    document.getElementById("staticrypt_loading").classList.add("hidden");
                    document.getElementById("staticrypt_content").classList.remove("hidden");
                    document.getElementById("staticrypt-password").focus();

                    // show the remember me checkbox
                    if (isRememberEnabled) {
                        document.getElementById("staticrypt-remember-label").classList.remove("hidden");
                    }
                }
            };

            // toggle password visibility
            const toggleIcon = document.querySelector(".staticrypt-toggle-password-visibility");
